name: Monitor legislativo

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Descargar el repo
      - uses: actions/checkout@v4

      # 2. DEBUG (ver archivos reales)
      - name: DEBUG archivos
        run: |
          echo "=== RAIZ ==="
          ls -la
          echo "=== TODO ==="
          ls -R

      # 3. Configurar Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r data/requirements.txt

      # 5. Descargar Google Sheets
      - name: Fetch watchlist
        run: python fetch_watchlist.py

      # 6. Ejecutar scraper
      - name: Run scraper
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python scraper.py

      # 7. Guardar cambios en db.json
      - name: Guardar cambios
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data/db.json
          git commit -m "update db" || echo "no changes"
          git push
