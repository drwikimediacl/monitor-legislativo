name: Actualizar base de datos legislativa

on:
  schedule:
    # Se ejecuta cada 6 horas (puedes cambiarlo)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde la pestaña Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Permiso para que la acción pueda hacer push

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar scraper
        run: |
          python scraper.py

      # Acción que maneja el commit y push automáticamente (sin errores de conflicto)
      - name: Guardar cambios en db.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática de db.json"
          file_pattern: "data/db.json"
          commit_user_name: "Bot Legislativo"
          commit_user_email: "bot@monitorlegislativo.cl"
          commit_author: "Bot Legislativo <bot@monitorlegislativo.cl>"
