name: Monitor legislativo

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Descargar el repo
      - uses: actions/checkout@v4

      # 2. Configurar Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r data/requirements.txt

      # 4. Descargar Google Sheets con debug
      - name: Fetch watchlist
        run: |
          echo "Starting fetch_watchlist.py..."
          python data/fetch_watchlist.py
          echo "Checking if file was created..."
          ls -la data/watchlist_enriched.xlsx

      # 5. Ejecutar scraper
      - name: Run scraper
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          echo "Starting scraper.py..."
          python data/scraper.py
          echo "Checking if db.json was created..."
          ls -la data/db.json

      # 6. Guardar cambios en db.json
      - name: Guardar cambios
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git fetch origin main
          git rebase origin/main
          git add data/db.json
          git commit -m "update db" || echo "no changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
