name: Monitoreo legislativo

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r data/requirements.txt

      - name: Descubrir proyectos (Senado + Cámara + Watchlist)
        run: python data/discover_projects.py

      - name: Monitorear cambios en proyectos
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python data/scraper.py

      - name: Generar dashboard web
        run: python data/generate_dashboard.py

      - name: Guardar todos los cambios (db.json, dashboard, etc.)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática: proyectos, cambios y dashboard"
          file_pattern: "data/ index.html"
          commit_user_name: "Bot Legislativo"
          commit_user_email: "bot@monitorlegislativo.cl"
