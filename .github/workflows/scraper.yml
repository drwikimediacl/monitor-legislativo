name: Monitoreo legislativo

on:
  schedule:
    # Se ejecuta cada 6 horas (puedes ajustar la frecuencia)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Permiso para hacer push

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Obtener watchlist desde Google Sheets
        run: |
          python data/fetch_watchlist.py

      - name: Ejecutar scraper y detectar cambios
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python scraper.py

      - name: Guardar cambios en db.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática de db.json"
          file_pattern: "data/db.json"
          commit_user_name: "Bot Legislativo"
          commit_user_email: "bot@monitorlegislativo.cl"
          commit_author: "Bot Legislativo <bot@monitorlegislativo.cl>"
